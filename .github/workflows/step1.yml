name: Step 1 — Twitter Keywords
on:
  schedule:
    - cron: '0/15 * * * *'   # каждые 15 минут (минуты 0, 15, 30, 45)
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: published_ids.json
          key: published-ids-${{ github.run_number }}
          restore-keys: published-ids-
      - env:
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:     ${{ secrets.CHANNEL_ID }}
          DEEPL_KEY:      ${{ secrets.DEEPL_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          STEP1_RSS_URLS: ${{ secrets.STEP1_RSS_URLS }}
          STEP1_KEYWORDS: ${{ secrets.STEP1_KEYWORDS }}
        run: python bot.py --step 1
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: published_ids.json
          key: published-ids-${{ github.run_number }}
