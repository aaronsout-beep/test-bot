name: Step 3 - Twitter Accounts

on:
  schedule:

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: step3-published-state
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      # Восстанавливаем состояние из кэша предыдущего run.
      # restore-keys без run_id гарантирует что найдётся любой предыдущий кэш.
      - name: Restore state
        id: restore
        uses: actions/cache/restore@v4
        with:
          path: |
            published_ids.json
            source_news_cache.json
          key: shared-state-${{ github.run_id }}
          restore-keys: |
            shared-state-

      - name: Show state
        run: |
          if [ -f published_ids.json ]; then
            echo "✅ published_ids.json восстановлен: $(wc -l < published_ids.json) строк"
          else
            echo "⚠️  published_ids.json не найден (первый запуск)"
          fi

      - name: Run bot
        env:
          BOT_TOKEN:          ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:         ${{ secrets.CHANNEL_ID }}
          DEEPL_KEY:          ${{ secrets.DEEPL_KEY }}
          OPENROUTER_KEY:     ${{ secrets.OPENROUTER_KEY }}
          OPENROUTER_MODEL:   ${{ secrets.OPENROUTER_MODEL }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          FORMAT_RAG_ENABLED: "1"
          STEP3_ACCOUNTS:     ${{ secrets.STEP3_ACCOUNTS }}
          SCWEET_AUTH_TOKEN:  ${{ secrets.SCWEET_AUTH_TOKEN }}
          SCWEET_PROXY:       ${{ secrets.SCWEET_PROXY }}
          STEP3_LIMIT:        ${{ vars.STEP3_LIMIT || '20' }}
        run: python bot.py --step 3

      # Сохраняем состояние всегда — даже если бот упал.
      # Новый уникальный ключ shared-state-<run_id> становится
      # кандидатом для restore-keys: shared-state- в следующем run.
      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            published_ids.json
            source_news_cache.json
          key: shared-state-${{ github.run_id }}
