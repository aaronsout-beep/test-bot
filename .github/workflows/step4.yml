name: Step 4 - Instagram Hashtags

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: step4-${{ github.repository }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Restore state
        id: restore
        uses: actions/cache/restore@v4
        with:
          path: |
            published_ids.json
            source_news_cache.json
          key: step4-state-${{ github.run_id }}
          restore-keys: |
            step4-state-
            step1-state-
            step3-state-
            step2-state-

      - name: Show state
        run: |
          if [ -f published_ids.json ]; then
            echo "✅ published_ids.json: $(wc -l < published_ids.json) строк"
          else
            echo "⚠️  published_ids.json не найден (первый запуск)"
          fi

      - name: Guard missing state
        id: state
        env:
          ALLOW_EMPTY_STATE: ${{ vars.ALLOW_EMPTY_STATE }}
        run: |
          if [ "${{ steps.restore.outputs.cache-hit }}" = "" ] && [ "${ALLOW_EMPTY_STATE}" != "1" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::warning::State cache not found; bot run skipped to avoid duplicate posts. Set repository variable ALLOW_EMPTY_STATE=1 only for an intentional first run."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bot
        if: steps.state.outputs.should_run == 'true'
        env:
          BOT_TOKEN:             ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:            ${{ secrets.CHANNEL_ID }}
          DEEPL_KEY:             ${{ secrets.DEEPL_KEY }}
          OPENROUTER_KEY:        ${{ secrets.OPENROUTER_KEY }}
          OPENROUTER_MODEL:      ${{ secrets.OPENROUTER_MODEL }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          FORMAT_RAG_ENABLED:    "1"
          REQUIRE_PUBLISHED_CACHE: ${{ vars.ALLOW_EMPTY_STATE == '1' && '0' || '1' }}
          APIFY_TOKEN:           ${{ secrets.APIFY_TOKEN }}
          STEP4_HASHTAGS:        ${{ secrets.STEP4_HASHTAGS }}
          APIFY_HASHTAG_ACTOR:   ${{ secrets.APIFY_HASHTAG_ACTOR }}
          APIFY_HASHTAG_RESULTS_LIMIT:     ${{ secrets.APIFY_HASHTAG_RESULTS_LIMIT }}
          APIFY_HASHTAG_ONLY_NEWER_THAN:   ${{ secrets.APIFY_HASHTAG_ONLY_NEWER_THAN }}
          APIFY_MAX_TOTAL_CHARGE_USD:      ${{ secrets.APIFY_MAX_TOTAL_CHARGE_USD }}
          APIFY_RUN_TIMEOUT:     ${{ secrets.APIFY_RUN_TIMEOUT }}
          STEP4_SIGNATURE:       ${{ secrets.STEP4_SIGNATURE }}
          STEP4_PREFIX:          ${{ secrets.STEP4_PREFIX }}
          STEP4_ALLOWED_ACCOUNTS: ${{ secrets.STEP4_ALLOWED_ACCOUNTS }}
          VK_ACCESS_TOKEN:    ${{ secrets.VK_ACCESS_TOKEN }}
          VK_OWNER_ID:        ${{ secrets.VK_OWNER_ID }}
          VK_API_VERSION:     ${{ secrets.VK_API_VERSION }}
          VK_FROM_GROUP:      ${{ secrets.VK_FROM_GROUP }}
          VK_CROSSPOST_DELAY_MINUTES:  ${{ vars.VK_CROSSPOST_DELAY_MINUTES || '1' }}
          MAX_TOKEN:             ${{ secrets.MAX_TOKEN }}
          MAX_CHAT_ID:           ${{ secrets.MAX_CHAT_ID }}
          MAX_USER_ID:           ${{ secrets.MAX_USER_ID }}
          ALERT_CHANNEL_ID:      ${{ secrets.ALERT_CHANNEL_ID }}
          BOT_NAME:              ${{ vars.BOT_NAME || 'NicoPazBot' }}
          SIGNATURE_HASHTAG:     ${{ secrets.SIGNATURE_HASHTAG }}
          SIGNATURE_URL:         ${{ secrets.SIGNATURE_URL }}
          SIGNATURE_URL_TEXT:    ${{ secrets.SIGNATURE_URL_TEXT }}
        run: python bot.py --step 4

      - name: Save state
        if: always() && steps.state.outputs.should_run == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            published_ids.json
            source_news_cache.json
          key: step4-state-${{ github.run_id }}
