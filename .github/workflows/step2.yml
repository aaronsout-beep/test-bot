name: Step 2 - Instagram Accounts

on:
  schedule:
    # Europe/Samara is UTC+4: 12:00, 15:00, 18:00, 21:00, 00:00 Samara.
    - cron: '0 8,11,14,17,20 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bot-shared-state
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Restore state
        id: restore
        uses: actions/cache/restore@v4
        with:
          path: |
            published_ids.json
            source_news_cache.json
            ig_user_id_cache.json
          key: shared-state-${{ github.run_id }}
          restore-keys: |
            shared-state-

      - name: Show state
        run: |
          if [ -f published_ids.json ]; then
            echo "✅ published_ids.json: $(wc -l < published_ids.json) строк"
          else
            echo "⚠️  published_ids.json не найден (первый запуск)"
          fi

      - name: Guard missing state
        id: state
        env:
          ALLOW_EMPTY_STATE: ${{ vars.ALLOW_EMPTY_STATE }}
        run: |
          if [ "${{ steps.restore.outputs.cache-hit }}" = "" ] && [ "${ALLOW_EMPTY_STATE}" != "1" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::warning::State cache not found; bot run skipped to avoid duplicate posts. Set repository variable ALLOW_EMPTY_STATE=1 only for an intentional first run."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bot
        if: steps.state.outputs.should_run == 'true'
        env:
          BOT_TOKEN:                          ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:                         ${{ secrets.CHANNEL_ID }}
          DEEPL_KEY:                          ${{ secrets.DEEPL_KEY }}
          OPENROUTER_KEY:                     ${{ secrets.OPENROUTER_KEY }}
          OPENROUTER_MODEL:                   ${{ secrets.OPENROUTER_MODEL }}
          GEMINI_API_KEY:                     ${{ secrets.GEMINI_API_KEY }}
          FORMAT_RAG_ENABLED:                 "1"
          REQUIRE_PUBLISHED_CACHE:            ${{ vars.ALLOW_EMPTY_STATE == '1' && '0' || '1' }}
          IG_COOKIES_JSON:                    ${{ secrets.IG_COOKIES_JSON }}
          STEP2_INSTAGRAM_ACCOUNTS:           ${{ secrets.STEP2_INSTAGRAM_ACCOUNTS }}
          IG_RESULTS_LIMIT:                   ${{ vars.IG_RESULTS_LIMIT || '10' }}
          IG_ONLY_NEWER_THAN_HOURS:           ${{ vars.IG_ONLY_NEWER_THAN_HOURS || '48' }}
          IG_SKIP_PINNED:                     ${{ vars.IG_SKIP_PINNED || '1' }}
          VK_ACCESS_TOKEN:                    ${{ secrets.VK_ACCESS_TOKEN }}
          VK_OWNER_ID:                        ${{ secrets.VK_OWNER_ID }}
          VK_API_VERSION:                     ${{ secrets.VK_API_VERSION }}
          VK_FROM_GROUP:                      ${{ secrets.VK_FROM_GROUP }}
          MAX_TOKEN:                          ${{ secrets.MAX_TOKEN }}
          MAX_CHAT_ID:                        ${{ secrets.MAX_CHAT_ID }}
          MAX_USER_ID:                        ${{ secrets.MAX_USER_ID }}
          ALERT_CHANNEL_ID:                   ${{ secrets.ALERT_CHANNEL_ID }}
          BOT_NAME:                           ${{ vars.BOT_NAME || 'NicoPazBot' }}
          IG_PROXY:                           ${{ secrets.IG_PROXY }}
        run: python bot.py --step 2

      - name: Save state
        if: always() && steps.state.outputs.should_run == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            published_ids.json
            source_news_cache.json
            ig_user_id_cache.json
          key: shared-state-${{ github.run_id }}
