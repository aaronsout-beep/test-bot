name: Step 2 - Instagram
on:
  schedule:
    # Europe/Samara is UTC+4: 12:00, 15:00, 18:00, 21:00, 00:00 Samara.
    - cron: '0 8,11,14,17,20 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: published_ids.json
          key: published-ids-${{ github.run_number }}
          restore-keys: published-ids-
      - env:
          BOT_TOKEN:   ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:  ${{ secrets.CHANNEL_ID }}
          DEEPL_KEY:   ${{ secrets.DEEPL_KEY }}
          RSSAPP_URL:  ${{ secrets.RSSAPP_URL }}
        run: python bot.py --step 2
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: published_ids.json
          key: published-ids-${{ github.run_number }}
