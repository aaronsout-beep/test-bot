name: Step 5 - Publish Queue

on:
  workflow_dispatch:
  schedule:
    # Каждые 30 минут
    - cron: '*/30 * * * *'

permissions:
  contents: read

concurrency:
  group: step5-${{ github.repository }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: |
            published_ids.json
            source_news_cache.json
            ig_user_id_cache.json
            queue.json
          key: step5-state-${{ github.run_id }}
          restore-keys: |
            step5-state-
            step1-state-
            step2-state-
            step3-state-
            step4-state-

      - name: Show state
        run: |
          if [ -f published_ids.json ]; then
            echo "✅ published_ids.json: $(wc -l < published_ids.json) строк"
          else
            echo "⚠️  published_ids.json не найден"
          fi
          if [ -f queue.json ]; then
            echo "📋 queue.json: $(python3 -c 'import json; q=json.load(open("queue.json")); print(len(q))') постов в очереди"
          else
            echo "📋 queue.json не найден (очередь пуста)"
          fi

      - name: Run queue publisher
        env:
          BOT_TOKEN:          ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:         ${{ secrets.CHANNEL_ID }}
          DEEPL_KEY:          ${{ secrets.DEEPL_KEY }}
          OPENROUTER_KEY:     ${{ secrets.OPENROUTER_KEY }}
          OPENROUTER_MODEL:   ${{ secrets.OPENROUTER_MODEL }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          FORMAT_RAG_ENABLED: "1"
          VK_ACCESS_TOKEN:    ${{ secrets.VK_ACCESS_TOKEN }}
          VK_OWNER_ID:        ${{ secrets.VK_OWNER_ID }}
          VK_API_VERSION:     ${{ secrets.VK_API_VERSION }}
          VK_FROM_GROUP:      ${{ secrets.VK_FROM_GROUP }}
          MAX_TOKEN:          ${{ secrets.MAX_TOKEN }}
          MAX_CHAT_ID:        ${{ secrets.MAX_CHAT_ID }}
          MAX_USER_ID:        ${{ secrets.MAX_USER_ID }}
          ALERT_CHANNEL_ID:   ${{ secrets.ALERT_CHANNEL_ID }}
          BOT_NAME:           ${{ vars.BOT_NAME || 'NicoPazBot' }}
          SIGNATURE_HASHTAG:  ${{ secrets.SIGNATURE_HASHTAG }}
          SIGNATURE_URL:      ${{ secrets.SIGNATURE_URL }}
          SIGNATURE_URL_TEXT: ${{ secrets.SIGNATURE_URL_TEXT }}
          QUEUE_BATCH_SIZE:   ${{ vars.QUEUE_BATCH_SIZE || '2' }}
        run: python bot.py --step 5

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            published_ids.json
            source_news_cache.json
            ig_user_id_cache.json
            queue.json
          key: step5-state-${{ github.run_id }}
